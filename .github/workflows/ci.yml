name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read   # least privilege for GITHUB_TOKEN

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6        # node24 runtime (v4 was node20, deprecated)
      - uses: actions/setup-python@v6    # node24 runtime
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.15.16   # pinned to the version the code is linted against
      - name: Lint
        run: ruff check src/ tests/
